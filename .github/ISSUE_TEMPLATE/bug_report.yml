name: Bug Report
description: Something isn't working right
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      placeholder: Describe the bug
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux (Ubuntu/Debian)
        - Linux (Fedora/RHEL)
        - Linux (Arch)
        - Linux (Alpine)
        - Linux (Void)
        - Linux (Gentoo)
        - Linux (NixOS)
        - Windows
        - Other
    validations:
      required: true
  - type: input
    id: gpk-version
    attributes:
      label: gpk version
      placeholder: "output of `gpk version`"
    validations:
      required: true
  - type: textarea
    id: package-manager
    attributes:
      label: Which package manager(s) are affected?
      placeholder: e.g. brew, apt, npm
  - type: textarea
    id: logs
    attributes:
      label: Any error output?
      render: shell
