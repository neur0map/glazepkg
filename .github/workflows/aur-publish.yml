name: Update AUR Package

on:
  release:
    types: [published]

jobs:
  aur-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get release version
        id: version
        run: echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download binaries and compute checksums
        run: |
          TAG="${GITHUB_REF_NAME}"
          curl -sL "https://github.com/neur0map/glazepkg/releases/download/${TAG}/gpk-linux-amd64" -o gpk-linux-amd64
          curl -sL "https://github.com/neur0map/glazepkg/releases/download/${TAG}/gpk-linux-arm64" -o gpk-linux-arm64
          echo "SHA_AMD64=$(sha256sum gpk-linux-amd64 | cut -d' ' -f1)" >> "$GITHUB_ENV"
          echo "SHA_ARM64=$(sha256sum gpk-linux-arm64 | cut -d' ' -f1)" >> "$GITHUB_ENV"

      - name: Generate PKGBUILD
        run: |
          cat > PKGBUILD << 'PKGEOF'
          # Maintainer: neur0map <90535780+neur0map@users.noreply.github.com>
          pkgname=gpk-bin
          pkgver=${{ steps.version.outputs.tag }}
          pkgrel=1
          pkgdesc="TUI dashboard that unifies 34 package managers into one searchable view"
          arch=('x86_64' 'aarch64')
          url="https://github.com/neur0map/glazepkg"
          license=('GPL-3.0-or-later')
          depends=()
          provides=('gpk')
          conflicts=('gpk')
          source_x86_64=("${url}/releases/download/v${pkgver}/gpk-linux-amd64")
          source_aarch64=("${url}/releases/download/v${pkgver}/gpk-linux-arm64")
          sha256sums_x86_64=('SHA_AMD64_PLACEHOLDER')
          sha256sums_aarch64=('SHA_ARM64_PLACEHOLDER')

          package() {
              if [[ "$CARCH" == "x86_64" ]]; then
                  install -Dm755 "gpk-linux-amd64" "${pkgdir}/usr/bin/gpk"
              elif [[ "$CARCH" == "aarch64" ]]; then
                  install -Dm755 "gpk-linux-arm64" "${pkgdir}/usr/bin/gpk"
              fi
          }
          PKGEOF
          sed -i "s/SHA_AMD64_PLACEHOLDER/${SHA_AMD64}/" PKGBUILD
          sed -i "s/SHA_ARM64_PLACEHOLDER/${SHA_ARM64}/" PKGBUILD
          # Remove leading whitespace from heredoc
          sed -i 's/^          //' PKGBUILD

      - name: Generate .SRCINFO
        run: |
          VER="${{ steps.version.outputs.tag }}"
          cat > .SRCINFO << EOF
          pkgbase = gpk-bin
          	pkgdesc = TUI dashboard that unifies 34 package managers into one searchable view
          	pkgver = ${VER}
          	pkgrel = 1
          	url = https://github.com/neur0map/glazepkg
          	arch = x86_64
          	arch = aarch64
          	license = GPL-3.0-or-later
          	provides = gpk
          	conflicts = gpk
          	source_x86_64 = https://github.com/neur0map/glazepkg/releases/download/v${VER}/gpk-linux-amd64
          	sha256sums_x86_64 = ${SHA_AMD64}
          	source_aarch64 = https://github.com/neur0map/glazepkg/releases/download/v${VER}/gpk-linux-arm64
          	sha256sums_aarch64 = ${SHA_ARM64}

          pkgname = gpk-bin
          EOF
          sed -i 's/^          //' .SRCINFO

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v3.0.1
        with:
          pkgname: gpk-bin
          pkgbuild: ./PKGBUILD
          commit_username: neur0map
          commit_email: 90535780+neur0map@users.noreply.github.com
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ github.ref_name }}"
          force_push: true
