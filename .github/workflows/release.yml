name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          GOOS=darwin GOARCH=arm64 go build -o gpk-darwin-arm64 ./cmd/gpk
          GOOS=darwin GOARCH=amd64 go build -o gpk-darwin-amd64 ./cmd/gpk
          GOOS=linux GOARCH=amd64 go build -o gpk-linux-amd64 ./cmd/gpk
          GOOS=linux GOARCH=arm64 go build -o gpk-linux-arm64 ./cmd/gpk

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            gpk-darwin-arm64
            gpk-darwin-amd64
            gpk-linux-amd64
            gpk-linux-arm64
